# MeetScribe — Docker Compose
#
# Currently hosts the self-hosted local transcription service. The MeetScribe
# desktop app, Python sidecar, and backend are run/deployed separately (see the
# root README and render.yaml) and are intentionally NOT defined here.
services:
  transcript-service:
    build: ./transcript-service
    container_name: meetscribe-transcript-service
    ports:
      - "9099:9099"
    volumes:
      # Place the CTranslate2 model under ./models on the host (see models/README.md).
      - ./models:/app/models
    environment:
      MODEL_PATH: /app/models/biodatlab-th-small-ct2
      DEVICE: cpu
      COMPUTE_TYPE: int8
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:9099/health').status==200 else 1)\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
