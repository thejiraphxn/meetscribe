# Render Blueprint — MeetScribe backend API.
#
# Deploy: Render Dashboard → New → Blueprint → connect this repo → Apply.
#
# Uses an EXISTING PostgreSQL (no managed database is provisioned here) — set
# DATABASE_URL in the Render dashboard at deploy time.
#
# Only the backend is deployed here. The desktop app, Python sidecar, native
# helper, and the (local-only) transcript-service run on the user's machine and
# are intentionally NOT part of this blueprint.
#
# Build order matters: `prisma generate` must run BEFORE `build:backend` because
# the backend's TypeScript imports the generated Prisma client types.
services:
  - type: web
    name: meetscribe-api
    runtime: node
    plan: free
    region: singapore
    branch: main
    healthCheckPath: /health
    # NODE_ENV=production is set below and is visible during build, which makes
    # `npm ci` skip devDependencies (typescript, @types/*, prisma). --include=dev
    # forces them so the TypeScript build + prisma CLI are available.
    buildCommand: >
      npm ci --include=dev &&
      npm run build:shared &&
      npm --workspace @meetscribe/backend exec prisma generate &&
      npm run build:backend
    startCommand: >
      npm --workspace @meetscribe/backend exec prisma migrate deploy &&
      node apps/backend/dist/index.js
    envVars:
      # Your existing PostgreSQL connection string — set this in the dashboard.
      - key: DATABASE_URL
        sync: false
      - key: NODE_ENV
        value: production
      # Generated once by Render and kept stable across deploys.
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      # Desktop deep-link scheme the backend redirects to after OAuth.
      - key: FRONTEND_URL
        value: meetscribe://
      # OPTIONAL — only for Google sign-in. Leave blank to use email/password
      # only. (BACKEND_URL is auto-derived from Render's injected
      # RENDER_EXTERNAL_URL, so it does not need to be set here.)
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
